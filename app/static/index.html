<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QQ Message Summary</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>QQ 消息总结</h1>
          <button id="refreshGroups" class="icon-button" title="刷新群列表" type="button">↻</button>
        </div>
        <div id="groupList" class="group-list empty">暂无群消息</div>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <div id="groupTitle" class="group-title">选择一个群</div>
            <div id="groupMeta" class="group-meta">接入 OneBot webhook 后，群会自动出现在这里。</div>
          </div>
          <div class="actions">
            <button id="summarizeBtn" type="button" disabled>总结未读</button>
            <button id="markReadBtn" type="button" disabled>标记已读</button>
          </div>
        </header>

        <div id="status" class="status" hidden></div>

        <div class="content-grid">
          <section class="panel">
            <div class="panel-header">
              <h2>未读消息</h2>
              <span id="unreadCount" class="count">0</span>
            </div>
            <div id="unreadMessages" class="message-list empty">还没有选择群。</div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>总结历史</h2>
            </div>
            <div id="summaryList" class="summary-list empty">暂无总结。</div>
          </section>

          <section class="panel history-panel">
            <div class="panel-header">
              <div>
                <h2>历史消息</h2>
                <div class="history-controls">
                  <input id="historyDate" type="date" aria-label="选择历史日期" />
                  <button id="loadHistoryDateBtn" type="button">查看日期</button>
                  <button id="clearHistoryDateBtn" type="button">最新</button>
                  <button id="deleteHistoryDayBtn" class="danger-button" type="button" disabled>删除当天</button>
                </div>
              </div>
              <span id="historyCount" class="count">0</span>
            </div>
            <div id="historyMessages" class="message-list history-list empty">还没有选择群。</div>
          </section>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
